<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Tools</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="brand-kicker">GitHub Pages</p>
          <h1>Web Tools</h1>
          <p class="brand-copy">小さな業務ツールをまとめて使えるシンプルな置き場です。</p>
        </div>
        <label class="mobile-nav" for="tool-select">
          <span>ツール選択</span>
          <select id="tool-select" class="tool-select">
            <option value="stock">株価取得</option>
            <option value="markdown">Excel→Markdown</option>
            <option value="network">接続情報</option>
            <option value="talk">つぶやき</option>
          </select>
        </label>
        <nav class="tool-nav" aria-label="ツールメニュー">
          <button class="nav-link is-active" data-route="stock">株価取得</button>
          <button class="nav-link" data-route="markdown">Excel→Markdown</button>
          <button class="nav-link" data-route="network">接続情報</button>
          <button class="nav-link" data-route="talk">つぶやき</button>
        </nav>
      </aside>

      <main class="content">
        <section class="hero">
          <p class="eyebrow">Simple Utility Suite</p>
          <h2 id="page-title">株価取得</h2>
          <p id="page-description">
            証券コードを入力して、指定日の終値を一覧表示します。各行またはまとめてワンクリックでコピーできます。
          </p>
        </section>

        <section id="tool-root" class="tool-root" aria-live="polite"></section>
      </main>
    </div>

    <template id="stock-template">
      <div class="panel">
        <div class="form-row">
          <label class="field">
            <span>証券コード</span>
            <input
              id="stock-code"
              name="stock-code"
              type="text"
              inputmode="numeric"
              placeholder="例: 9434"
              maxlength="10"
              autocomplete="off"
            />
          </label>
          <button id="fetch-stock" class="primary-button" type="button">株価を取得</button>
        </div>

        <div class="hint-list">
          <p>入力は東証コードを想定しています。取得対象は指定日の終値です。</p>
          <p>取得元は `Stooq` の日足データです。ブラウザ制限で取得できない環境ではエラーを表示します。</p>
        </div>

        <div id="stock-status" class="status-box">証券コードを入力してください。</div>

        <div class="result-actions">
          <button id="copy-stock-all" class="secondary-button" type="button" disabled>
            株価をコピー
          </button>
        </div>

        <div class="table-wrap">
          <table class="result-table">
            <thead>
              <tr>
                <th>日付</th>
                <th>終値</th>
              </tr>
            </thead>
            <tbody id="stock-results"></tbody>
          </table>
        </div>

        <label class="field block-field" for="stock-export">
          <span>Excel 貼り付け用</span>
          <textarea id="stock-export" rows="8" readonly placeholder="株価取得後にここへ一覧が入ります"></textarea>
        </label>
      </div>
    </template>

    <template id="markdown-template">
      <div class="panel">
        <label class="field block-field" for="excel-input">
          <span>Excel から貼り付け</span>
          <textarea
            id="excel-input"
            rows="12"
            placeholder="Excel から表をそのまま貼り付けてください"
          ></textarea>
        </label>

        <div class="form-row">
          <button id="convert-markdown" class="primary-button" type="button">Markdown に変換</button>
          <button id="copy-markdown" class="secondary-button" type="button" disabled>
            Markdown をコピー
          </button>
        </div>

        <div id="markdown-status" class="status-box">表を貼り付けて変換してください。</div>

        <label class="field block-field" for="markdown-output">
          <span>Markdown 出力</span>
          <textarea id="markdown-output" rows="12" readonly></textarea>
        </label>
      </div>
    </template>

    <template id="network-template">
      <div class="panel">
        <div class="form-row">
          <button id="refresh-network-info" class="primary-button" type="button">情報を更新</button>
          <button id="copy-network-info" class="secondary-button" type="button" disabled>
            結果をコピー
          </button>
        </div>

        <div class="hint-list">
          <p>グローバルIPと地域情報は外部APIから取得します。</p>
          <p>地域は推定値なので、VPN やプロキシ利用時は実際の場所と異なることがあります。</p>
        </div>

        <div id="network-status" class="status-box">情報を取得してください。</div>

        <div class="table-wrap">
          <table class="result-table">
            <thead>
              <tr>
                <th>項目</th>
                <th>値</th>
              </tr>
            </thead>
            <tbody id="network-results"></tbody>
          </table>
        </div>

        <label class="field block-field" for="network-export">
          <span>コピー用テキスト</span>
          <textarea id="network-export" rows="10" readonly placeholder="取得後にここへ結果が入ります"></textarea>
        </label>
      </div>
    </template>

    <template id="talk-template">
      <div class="panel talk-panel">
        <div class="talk-toolbar">
          <div id="talk-status" class="status-box">ひとりつぶやきを残せます。</div>
          <button id="clear-talk-messages" class="secondary-button" type="button">全クリア</button>
        </div>

        <div id="talk-empty" class="talk-empty">まだメッセージはありません。最初のつぶやきを残してください。</div>
        <div id="talk-list" class="talk-list" aria-live="polite"></div>

        <div class="talk-compose">
          <label class="field block-field" for="talk-input">
            <span>つぶやき</span>
            <textarea
              id="talk-input"
              rows="4"
              placeholder="今のメモや独り言を残せます。Enterで送信、Shift+Enterで改行。"
            ></textarea>
          </label>
          <div class="talk-compose-actions">
            <button id="send-talk-message" class="primary-button" type="button">送信</button>
          </div>
        </div>
      </div>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
